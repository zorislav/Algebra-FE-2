<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V11 Objekti Bonus</title>
  </head>
  <body>
    <script>
      const osoba = {
        ime: "Ivan",
        prezime: "Horvat",
        toJSON: function () {
          return this.ime + this.prezime;
        },
      };

      console.log(osoba.propertyIsEnumerable("ime"));
      console.log(osoba.propertyIsEnumerable("length"));
      console.log(Object.keys(osoba).length);

      const datum = new Date();
      console.log(datum.toString());
      console.log(datum.toLocaleString());

      console.log(osoba);
      console.log(JSON.stringify(osoba));

      const jsonAdresa = '{"ulica":"Ilica", "broj":21, "grad":"Zagreb"}';
      console.log(jsonAdresa);
      console.log(JSON.parse(jsonAdresa));
      const novaAdresa = JSON.parse(jsonAdresa);
      console.log(novaAdresa.ulica);

      const tekst = "Ovo je primjer teksta";
      const re = new RegExp("primjer");
      //const re1 = /primjer/;
      console.log(tekst);
      console.log(tekst.replace(re, "nastavak"));
    </script>
  </body>
</html>
