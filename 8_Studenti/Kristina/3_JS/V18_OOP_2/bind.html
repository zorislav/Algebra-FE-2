<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V18_Bind</title>
  </head>
  <body>
    <h1>V18_Bind</h1>
    <script>
      var obj = {
        num: 2,
      };
      function add(a) {
        return this.num + a;
      }

      console.log(add.bind(obj, 3)());

      var c = add.call(obj, 4);
      console.log(c);
    </script>
  </body>
</html>
