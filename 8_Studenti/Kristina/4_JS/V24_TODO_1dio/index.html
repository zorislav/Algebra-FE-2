<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>V24</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>My tasks</h1>
      <div class="btn-group">
        <button disabled id=" button-all">All</button>
        <button id="button-active">Active</button>
        <button id="button-completed">Completed</button>
      </div>
    </header>
    <main>
      <div id="section-todo">
        <div id="section-input">
          <input id="input-text" type="text" name="" />
          <input id="input-add" type="submit" value="Add" />
        </div>
        <ul class="ul-todo"></ul>
      </div>
      <div id="section-completed">
        <button id="btn-clear-completed">Clear completed</button>
      </div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
