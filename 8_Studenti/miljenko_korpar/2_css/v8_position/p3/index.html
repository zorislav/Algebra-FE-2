<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Position - absolute</title>
    <style>
      body {
        margin: 0px;
      }

      div {
        width: 200px;
        height: 200px;
      }

      .box1 {
        background-color: cadetblue;
      }

      .box2 {
        background-color: orange;
        position: absolute; /* Ovime micemo element iz standardnog flowa. Ako nemamo top i left, element se ne repozicionira, nego ostaje na staroj poziciji, ali prekriva element iz standardnog flowa koji je došao na njegovo mjesto.  */
        top: 100px; /* 100 px prema dolje u odnosu na body element jer nema ni jedan element roditelj koji ima position: relative */
        left: 100px; /* 100 px u desno u odnosu na body element jer nema ni jedan element roditelj koji nema position: relative */
      }

      .parent {
        width: 600px;
        height: 600px;
        border: 4px solid #666;
        margin: 2em auto;
        position: relative;
      }

      .box3 {
        background-color: orchid;
      }

      .box4 {
        background-color: seagreen;
        position: absolute;
        right: 0px;
        bottom: 0px;
      }
    </style>
  </head>
  <body>
    <div class="box1"></div>
    <div class="box2"></div>
    <div class="parent">
      <div class="box3"></div>
      <div class="box4"></div>
    </div>
  </body>
</html>
