<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pristupačnost</title>
    <style>
      #progerss-bar-container {
        border: 1px solid gray;
        width: 160px;
        height: 6px;
        background-color: lightgray;
        border-radius: 6px 0 0 6px;
      }

      #progress-bar {
        background-color: blue;
        width: 75%;
        height: 100%;
        border-radius: 6px 0 0 6px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Primjer pristupačmnosti</h1>
      <h2>Progress bar 1</h2>
      <div id="progerss-bar-container">
        <div
          id="progress-bar"
          role="progressbar"
          aria-valuemin="0"
          aria-valuemax="100"
          aria-valuenow="75"
        ></div>
      </div>
      <h2>Progress bar 2</h2>
      <progress value="75" max="100"></progress>
    </main>
  </body>
</html>
