<!doctype html>
<html lang="hr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/osnovno.css" />
    <link rel="stylesheet" href="../css/unos.css" />
    <title>DIGIRN</title>
  </head>
  <body>
    <header>
      <div id="header-container">
        <img src="../assets/digirn.png" alt="digirn logo" width="112" />

        <h2>DIGIRN</h2>
      </div>
      <br />
      <nav>
        <ul>
          <li><a href="../index.html">Glavna</a></li>
          <li><a href="lista.html">Nalozi</a></li>
        </ul>
      </nav>
      <div id="hamburger-icon">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
      </div>
    </header>
    <main>
      <aside>
        <nav>
          <ul>
            <li><a href="./html/lista.html">Nalozi</a></li>
          </ul>
        </nav>
      </aside>

      <section>
        <h1>Unos naloga</h1>
        <form action="">
          <hr />
          <div class="container">
            <label for="broj_naloga">Broj naloga:</label>
            <input
              type="text"
              id="broj_naloga"
              name="broj_naloga"
              maxlenght="10"
              size="10"
              required
            />
            <label for="narudzbenica">Narudžbenica:</label>
            <input
              type="text"
              id="narudzbenica"
              name="narudzbenica"
              maxlenght="10"
              size="10"
              required
            />
            <label for="datum_naloga">Datum otvaranja:</label>
            <input type="date" id="datum_naloga" name="datum_naloga" required />
          </div>
          <hr />
          <div class="container">
            <label for="narucitelj">Naručitelj:</label>
            <input
              type="text"
              id="narucitelj"
              name="narucitelj"
              maxlength="15"
              size="15"
            />
            <label for="izvrsitelj">Izvršitelj:</label>
            <input
              type="text"
              id="izvrsitelj"
              name="izvrsitelj"
              maxlength="15"
              size="15"
              required
            />
          </div>
          <hr />
          <div class="container">
            <label for="mjesto_troska">Mjesto troška:</label>
            <input
              type="text"
              id="mjesto_troska"
              name="mjesto_troska"
              maxlength="15"
              size="15"
            />
            <label for="nositelj_troska">Nositelj troška:</label>
            <input
              type="text"
              id="nositelj_troska"
              name="nositelj_troska"
              maxlength="15"
              size="15"
            />
          </div>
          <hr />
          <div class="container">
            <label for="datum_pocetka">Datum početka:</label>
            <input type="date" id="datum_pocetka" name="datum_pocetka" />
            <label for="vrijeme_pocetka">Vrijeme početka:</label>
            <input type="time" id="vrijeme_pocetka" name="vrijeme_pocetka" />
            <br />
          </div>
          <div class="container">
            <label for="datum_zavrsetka">Datum završetka:</label>
            <input type="date" id="datum_zavrsetka" name="datum_zavrsetka" />
            <label for="vrijeme_zavrsetka">Vrijeme završetka:</label>
            <input
              type="time"
              id="vrijeme_zavrsetka"
              name="vrijeme_zavrsetka"
            />
          </div>
          <hr />
          <div class="container">
            <label for="naslov">Naslov:</label>
            <input type="text" id="naslov" name="naslov" />
          </div>
          <hr />
          <div class="container">
            <label for="opis">Opis rada:</label>
            <textarea
              name="opis"
              id="opis"
              maxlength="50"
              cols="20"
              rows="5"
            ></textarea>
          </div>
          <hr />
          <div class="button-container">
            <button type="reset">Poništi</button>
            <button type="submit">U redu</button>
          </div>
        </form>
      </section>
    </main>
  </body>
</html>
