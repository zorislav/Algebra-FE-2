<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="stylesheet" href="../css/osnovno.css" />

    <title>DIGIRN</title>
  </head>
  <body>
    <header>
      <div id="header-container">
        <img src="../assets/digirn.png" alt="digirn logo" width="150px" />
        <h2>DIGIRN</h2>
      </div>
      <nav>
        <ul>
          <li><a href="../index.html">Glavna stranica</a></li>
          <li><a href="lista.html">Nalozi</a></li>
          <li><a href="#">Izmjena naloga</a></li>
          <li><a href="#">Brisanje naloga</a></li>
        </ul>
      </nav>
      <div id="hamburger-icon">
        <div class="bar1"></div>
        <div class="bar2"></div>
        <div class="bar3"></div>
      </div>
    </header>
    <main>
      <section>
        <h1>Prikaz naloga</h1>
        <hr />
        <div class="container">
          <p>Broj naloga:</p>
          <p id="broj-naloga"></p>
          <p>Narudžbenica:</p>
          <p id="broj-narudzbe"></p>
          <p>Datum otvaranja:</p>
          <p id="datum-naloga"></p>
        </div>

        <hr />
        <div class="container">
          <p>Naručitelj:</p>
          <p id="narucitelj"></p>
          <p>Izvršitelj:</p>

          <p>Nositelj troška:</p>

        </div>
        <hr />
        <div class="container">
          <p>Datum početka:</p>
          <p id="datum-pocetka"></p>

          <p id="vrijeme_pocetka"></p>

        <div class="container">
          <p>Datum završetka:</p>
          <p id="datum-zavrsetka"></p>
          <p>Vrijeme završetka:</p>
          <p id="vrijeme-zavrsetka"></p>
        </div>
        <hr />
        <div class="container">
          <p>Naslov:</p>
          <p id="naslov"></p>
        </div>
        <hr />
        <div class="container">
          <p>Opis rada:</p>
          <p id="opis"></p>
        </div>
        <hr />
      </section>

    <script type="module" src="../js/prikaz.js"></script>
